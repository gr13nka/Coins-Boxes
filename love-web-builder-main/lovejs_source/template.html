<!doctype html>
<html lang="en-us">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <meta name="mobile-web-app-capable" content="yes">

        <title>{{{ TITLE }}}</title>

        <!-- Load custom style sheet -->
        <link rel="stylesheet" type="text/css" href="theme/love.css">

        <!-- Yandex Games SDK -->
        <script src="https://yandex.ru/games/sdk/v2"></script>
        <script>
            window.yandexBridge = {
                sdkReady: false,
                interstitialResult: 'none',
                rewardedAdResult: 'none',

                init: function() {
                    if (typeof YaGames === 'undefined') return;
                    YaGames.init().then(function(ysdk) {
                        window.ysdk = ysdk;
                        window.yandexBridge.sdkReady = true;
                        if (ysdk.features && ysdk.features.LoadingAPI) {
                            ysdk.features.LoadingAPI.ready();
                        }
                    }).catch(function(e) {
                        console.warn('Yandex SDK init failed:', e);
                    });
                },

                showInterstitial: function() {
                    if (!window.ysdk) return;
                    window.yandexBridge.interstitialResult = 'showing';
                    window.ysdk.adv.showFullscreenAdv({
                        callbacks: {
                            onOpen: function() {
                                window.yandexBridge.interstitialResult = 'open';
                                if (typeof Module._love_setFocus === 'function') {
                                    Module._love_setFocus(false);
                                }
                            },
                            onClose: function(wasShown) {
                                window.yandexBridge.interstitialResult = wasShown ? 'closed_shown' : 'closed_not_shown';
                                if (typeof Module._love_setFocus === 'function') {
                                    Module._love_setFocus(true);
                                }
                            },
                            onError: function(e) {
                                window.yandexBridge.interstitialResult = 'error';
                                if (typeof Module._love_setFocus === 'function') {
                                    Module._love_setFocus(true);
                                }
                            },
                            onOffline: function() {
                                window.yandexBridge.interstitialResult = 'error';
                            }
                        }
                    });
                },

                showRewarded: function() {
                    if (!window.ysdk) return;
                    window.yandexBridge.rewardedAdResult = 'watching';
                    window.ysdk.adv.showRewardedVideo({
                        callbacks: {
                            onOpen: function() {
                                window.yandexBridge.rewardedAdResult = 'open';
                                if (typeof Module._love_setFocus === 'function') {
                                    Module._love_setFocus(false);
                                }
                            },
                            onRewarded: function() {
                                window.yandexBridge.rewardedAdResult = 'rewarded';
                            },
                            onClose: function() {
                                if (window.yandexBridge.rewardedAdResult === 'rewarded') {
                                    window.yandexBridge.rewardedAdResult = 'closed_rewarded';
                                } else {
                                    window.yandexBridge.rewardedAdResult = 'closed_no_reward';
                                }
                                if (typeof Module._love_setFocus === 'function') {
                                    Module._love_setFocus(true);
                                }
                            },
                            onError: function(e) {
                                window.yandexBridge.rewardedAdResult = 'error';
                                if (typeof Module._love_setFocus === 'function') {
                                    Module._love_setFocus(true);
                                }
                            }
                        }
                    });
                },

                showBanner: function() {
                    if (!window.ysdk) return;
                    window.ysdk.adv.showBannerAdv();
                },

                hideBanner: function() {
                    if (!window.ysdk) return;
                    window.ysdk.adv.hideBannerAdv();
                }
            };

            window.yandexBridge.init();
        </script>
    </head>
    <body>
        <div id="container" class="love-desktop-frame">
            <canvas id="canvas" width="{{{ WIDTH }}}" height="{{{ HEIGHT }}}" tabindex="-1"></canvas>
            <div id='message-container'>
                <div id='message'></div>
                <div id='progress-border'><div id='progress-bar'></div></div>
            </div>
        </div>

        <!-- LÖVE -->
        <script type='text/javascript'>
            var container = document.querySelector("#container");
            var canvas = document.getElementById("canvas");
            var progress_bar = document.querySelector("#progress-bar");

            var complete = false;

            var Module;

            function setFocus() {
                window.focus();
                canvas.focus();
            }

            document.addEventListener('contextmenu', event => event.preventDefault());

            canvas.addEventListener("touchstart", () => {
                window.focus();
            });
            canvas.addEventListener("pointerdown", () => {
                window.focus();
            });

            // window.addEventListener('pointerdown', () => {
            //     setFocus();
            // });
            // window.addEventListener('touchstart', () => {
            //     setFocus();
            // });

            document.addEventListener("pointerdown", () => {
                container.focus();
                setFocus();
            });

            for (const key of [
                "fullscreenchange", "mozfullscreenchange", "webkitfullscreenchange", "msfullscreenchange"]) {
                    if (key in document) {
                        document.addEventListener(key, function(params) {
                            setFocus();
                        })
                    }
            }

            function drawMessage(text) {
                message.innerHTML = text;
            }

            function drawLoadingStatus(text, current_value, total_value) {
                var ratio = complete ? 1 : 0;
                if (current_value && total_value) {
                    ratio = current_value / total_value;
                }
                if (ratio >= 1 || text == 'Running...') {
                    complete = true;
                    ratio = 1;
                }

                progress_bar.style.width = (ratio * 100) + '%';
                drawMessage(text);
            }

            function onException(exception_message) {
                canvas.remove();
                console.log(exception_message);
                alert('An error has occurred:\n' + exception_message + '\n\nSee JavaScript console.')
                
                drawMessage('An error has occurred, see JavaScript console');
                Module.setStatus = function(text) {
                    if (text) Module.printErr('[post-exception status] ' + text);
                };
            }

            window.onerror = function(message) {
                onException(message);
            };
        </script>

        <script type="text/javascript" src="game.js"></script>
        <script type="text/javascript" src="love.js" onload="applicationLoad(this);"></script>
    </body>
</html>
