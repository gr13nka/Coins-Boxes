name: Deploy to itch.io

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare game files
        run: |
          mkdir game-src
          cp *.lua game-src/
          cp "comic shanns.otf" game-src/
          cp -r assets game-src/
          cp -r sfx game-src/
          cp -r bgnd_music game-src/

      - name: Build HTML5 with love-web-builder
        run: |
          cd love-web-builder-main
          python3 build.py ../game-src game

      - name: Install butler
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: ./butler push love-web-builder-main/game mblw/sorting-master:html5
